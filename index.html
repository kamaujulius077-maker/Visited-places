<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visited Places</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>🌍 Visited Places</h1>
            <p>Track and remember every place you've been!</p>
        </div>
    </header>

    <main class="container main-grid">
        <section class="form-card">
            <h2>Add a place</h2>
            <form id="placeForm">
                <div class="form-group">
                    <lable for="placeName">Place Name:</lable>
                    <input type="text" id="placeName" name="placeName" required>
                    <span class="error-message" id="placeNameError"></span>
                </div>
            </form>
        </section>
    </main>

</body>
</html>
