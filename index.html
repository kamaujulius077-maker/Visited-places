<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visited Places</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>🌍 Visited Places</h1>
            <p>Track and remember every place you've been!</p>
        </div>
    </header>

    <main class="container main-grid">
        <section class="form-card">
            <h2>Add a place</h2>
            <form id="placeForm">
                <div class="form-group">
                    <lable for="placeName">Place Name:</lable>
                    <input type="text" id="placeName" name="placeName" required>
                    <span class="error-message" id="placeNameError"></span>
                </div>

                <div class="form-group">
                    <lable for="dateVisited">Date Visited</lable>
                    <input type="date" id="dateVisited" name="dateVisited" required>
                </div>
                <div class="form-group">
                    <lable for="landmarks">Landmarks seen</lable>
                    <input type="text" id="landmarks" name="landmarks" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <lable for="season">Time of Year</lable>
                        <select id="season" name="season" required>
                        <option value="">Select Season</option>
                        <option value="Spring">Spring</option>
                        <option value="Autum">Autum</option>
                        <option value="Winter">Winter</option>
                        <option value="Summer">Summer</option>
                        </select>

                    </div>

                    <div class="form-group">
                        <lable for="rating">Rating</lable>
                        <select id="rating" name="rating" required>
                            <option value="">Rate it</option>
                            <option value="5"> 5 - Amazing</option>
                            <option value="4"> 4 - Good</option>
                            <option value="3"> 3 - Avarege</option>
                            <option value="2"> 2 - Poor</option>
                            <option value="1"> 1 - Bad</option>
                            </select>
                    </div>
                </div>
                <div class="form-group">
                    <lable for="notes">Notes</lable>
                    <textarea id="notes" name="notes" row="3" placeholder="What stood out?"></textarea>
                </div>
                <button type="submit" class="btn-primary">Add Place</button>
                <div class="success-message" id="success-message">Place added greatly</div>
            </form>
        </section>

        <section class="place-card">
            <h2>My Places</h2>
            <div id="placeList" class="places-grid"></div>
            <div id="empty-state" class="empty-state">
                <p>No places added yet</p>
            </div>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
